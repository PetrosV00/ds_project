<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{page_layout/layout}">

<head>
  <meta charset="UTF-8">
  <title>Property Details</title>
</head>
<body>
<div layout:fragment="main-content">
<form action="#" th:action="@{/properties/new}" th:object="${property}"
        method="post">


    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" class="form-control" th:field="*{title}">
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" class="form-control" th:field="*{description}">
    </div>

    <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" class="form-control" th:field="*{address}">
    </div>

    <div class="form-group">
        <label for="price">Price</label>
        <input type="text" id="price" class="form-control" th:field="*{price}">
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
</body>
</html>
